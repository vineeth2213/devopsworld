name: Full CI/CD Pipeline (Docker + EC2)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # --------------------
      # 1. Checkout code
      # --------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------
      # 2. Login to Docker Hub
      # --------------------
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # --------------------
      # 3. Build Docker image
      # --------------------
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/pythonapp:latest .

      # --------------------
      # 4. Push Docker image
      # --------------------
      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/pythonapp:latest

      # --------------------
      # 5. Setup SSH key
      # --------------------
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem

      # --------------------
      # 6. Add EC2 to known hosts
      # --------------------
      - name: Add EC2 to known hosts
        run: ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # --------------------
      # 7. Deploy on EC2
      # --------------------
      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/ec2_key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            docker pull ${{ secrets.DOCKER_USERNAME }}/pythonapp:latest

            docker stop app || true
            docker rm app || true

            docker run -d \
              -p 80:5000 \
              --name app \
              ${{ secrets.DOCKER_USERNAME }}/pythonapp:latest
          EOF